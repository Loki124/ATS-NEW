name: ATS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: 35010800
          MYSQL_DATABASE: ats_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
        run: ./node_modules/.bin/prisma generate

      - name: Apply migrations (fresh DB)
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
        run: |
          ./node_modules/.bin/prisma migrate deploy
          # 跑种子 (admin 用户, 22 通知模板等)
          npm run db:seed

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
          JWT_SECRET: ci-test-secret-32-chars-min-len-required
        run: NODE_OPTIONS=--experimental-vm-modules ./node_modules/.bin/jest src/services/__tests__/ --runInBand

      - name: Run referral tests
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
          JWT_SECRET: ci-test-secret-32-chars-min-len-required
        run: NODE_OPTIONS=--experimental-vm-modules ./node_modules/.bin/jest src/referral/__tests__/ --testPathIgnorePatterns=integration --runInBand

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: 35010800
          MYSQL_DATABASE: ats_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
        run: ./node_modules/.bin/prisma generate

      - name: Apply migrations + seed (for e2e)
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
        run: |
          ./node_modules/.bin/prisma migrate deploy
          npm run db:seed

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
          JWT_SECRET: ci-e2e-secret-32-chars-min-len-required
        run: |
          nohup node --env-file=.env src/app.js > /tmp/e2e-backend.log 2>&1 &
          sleep 5

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        env:
          CI: true
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  test-migrations:
    name: Test Migration Deploy
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: 35010800
          MYSQL_DATABASE: ats_migration_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Verify migrate deploy (fresh DB)
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_migration_test
          JWT_SECRET: ci-migration-test-secret-32-chars-min
        run: |
          ./node_modules/.bin/prisma migrate deploy
          # 验证表数量
          TABLE_COUNT=$(mysql -h 127.0.0.1 -uroot -p35010800 -N -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='ats_migration_test';" 2>/dev/null)
          echo "迁移后表数量: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -lt 50 ]; then
            echo "❌ 表数量 < 50, 迁移失败"
            exit 1
          fi
          echo "✅ 迁移验证通过"

      - name: Verify idempotency (re-run = no-op)
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_migration_test
          JWT_SECRET: ci-migration-test-secret-32-chars-min
        run: |
          ./node_modules/.bin/prisma migrate deploy
          echo "✅ 二次 deploy 幂等性验证通过"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
