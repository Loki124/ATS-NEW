name: ATS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_PASSWORD: 35010800
          MYSQL_DATABASE: ats_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
        run: ./node_modules/.bin/prisma generate

      - name: Push DB schema
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
        run: ./node_modules/.bin/prisma db push --accept-data-loss

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
          JWT_SECRET: ci-test-secret-32-chars-min-len-required
        run: NODE_OPTIONS=--experimental-vm-modules ./node_modules/.bin/jest src/services/__tests__/ --runInBand

      - name: Run referral tests
        working-directory: backend
        env:
          DATABASE_URL: mysql://root:35010800@127.0.0.1:3306/ats_test
          JWT_SECRET: ci-test-secret-32-chars-min-len-required
        run: NODE_OPTIONS=--experimental-vm-modules ./node_modules/.bin/jest src/referral/__tests__/ --testPathIgnorePatterns=integration --runInBand

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
