version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5125:5125"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=ats-super-secret-key-2024-production
      - PORT=5125
      - CORS_ORIGIN=http://localhost:9908
    volumes:
      - backend-data:/app/prisma
    networks:
      - ats-network

  nginx:
    image: nginx:alpine
    ports:
      - "9908:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - ats-network
    restart: unless-stopped

networks:
  ats-network:
    driver: bridge

volumes:
  backend-data: